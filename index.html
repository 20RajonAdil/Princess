<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>From Adil to Princess</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    min-height: 100vh;
    overflow: auto; /* Changed so you can scroll */
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: white;
    background: linear-gradient(135deg, #1a0033, #4b0082, #ff69b4);
    position: relative;
}
body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
        radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255, 105, 180, 0.15) 0%, transparent 50%),
        url('https://picsum.photos/id/1015/1920/1080') center/cover;
    opacity: 0.4;
    z-index: 1;
    animation: nebulaShift 25s infinite alternate ease-in-out;
}
/* Floating stars & sparkles */
.star {
    position: absolute;
    color: #fff;
    text-shadow: 0 0 8px #ffd700;
    animation: twinkle 3s infinite alternate;
    z-index: 2;
    pointer-events: none;
}
@keyframes nebulaShift {
    0% { transform: scale(1) rotate(0deg); }
    100% { transform: scale(1.08) rotate(3deg); }
}
@keyframes twinkle {
    0% { opacity: 0.4; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1.2); }
}
.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 30, 0.45);
    backdrop-filter: blur(6px);
    z-index: 3;
}
.container {
    position: relative;
    z-index: 10;
    width: 92%;
    max-width: 460px;
    margin: 30px auto;
    padding: 30px 25px;
    border-radius: 30px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 215, 0, 0.3);
    box-shadow: 0 0 40px rgba(255, 105, 180, 0.4),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
    text-align: center;
    animation: floatCard 6s infinite ease-in-out;
}
@keyframes floatCard {
    50% { transform: translateY(-12px); }
}
h1 {
    font-size: 2.4rem;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #ffd700, #ff69b4, #fff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
}
.subtitle {
    font-size: 1.1rem;
    opacity: 0.95;
    margin-bottom: 25px;
    font-style: italic;
}

/* Profile Picture */
.profile-frame {
    width: 170px;
    height: 170px;
    margin: 10px auto 20px;
    padding: 8px;
    background: rgba(255,255,255,0.15);
    border: 5px solid rgba(255, 215, 0, 0.7);
    border-radius: 50%;
    box-shadow: 0 0 30px rgba(255,105,180,0.5);
    transition: all 0.3s ease;
}
.profile-frame:hover {
    transform: scale(1.05);
}
.profile-frame img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
}

.poem-container {
    position: relative;
    min-height: 180px;
    padding: 20px;
    margin: 20px 0;
    border-radius: 20px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 215, 0, 0.3);
}
.poem {
    font-size: 1.15rem;
    line-height: 1.75;
    min-height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}
.controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 20px 0;
}
button {
    border: none;
    padding: 14px 24px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: bold;
    font-size: 1rem;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
}
button:hover {
    transform: translateY(-4px) scale(1.05);
}
#newPoemBtn {
    background: linear-gradient(90deg, #ff69b4, #ffd700);
    color: #1a0033;
}
#catRainBtn {
    background: linear-gradient(90deg, #4b0082, #ff1493);
    color: white;
}
#sparkleBtn {
    background: #ffd700;
    color: #1a0033;
}
.title-box {
    margin: 20px 0;
    font-size: 1.25rem;
    color: #ffd700;
    min-height: 50px;
    text-shadow: 0 0 10px #ff69b4;
    font-weight: bold;
}
.meter {
    margin-top: 15px;
}
.bar {
    height: 18px;
    background: rgba(255,255,255,0.2);
    border-radius: 50px;
    overflow: hidden;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
}
.fill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #ff69b4, #ffd700, #ff69b4);
    animation: pulse 1.8s infinite;
}
@keyframes pulse {
    50% { opacity: 0.75; }
}
/* Cats */
.cat {
    position: absolute;
    font-size: 42px;
    z-index: 20;
    animation: fall linear forwards;
    filter: drop-shadow(0 0 8px #fff);
    pointer-events: none;
}
@keyframes fall {
    to {
        transform: translateY(110vh) rotate(25deg);
        opacity: 0;
    }
}
/* Crown */
.crown {
    display: inline-block;
    font-size: 2.8rem;
    animation: crownWobble 4s infinite ease-in-out;
    margin-bottom: 10px;
}
@keyframes crownWobble {
    0%, 100% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
}
/* Sparkles */
.sparkle {
    position: absolute;
    color: #fff;
    font-size: 18px;
    animation: sparkleAnim 1.2s forwards;
    z-index: 25;
    pointer-events: none;
}
@keyframes sparkleAnim {
    0% { transform: scale(0.5); opacity: 1; }
    100% { transform: scale(2); opacity: 0; }
}

/* Mobile Friendly */
@media (max-width: 480px) {
    .container {
        width: 95%;
        padding: 20px 15px;
        margin: 15px auto;
    }
    h1 { font-size: 2rem; }
    .profile-frame {
        width: 140px;
        height: 140px;
    }
    .crown { font-size: 2.4rem; }
}
</style>
</head>
<body>
<div class="overlay"></div>
<div class="container">
    <div class="crown">👑</div>
    <h1>From Adil to Princess</h1>
    <div class="subtitle">Mia — Ruler of Kepler-23 & All Things Sparkly ✨</div>
    
    <!-- Profile Picture - Replace URL with your photo -->
    <div class="profile-frame">
        <img src="WhatsApp Image 2026-06-24 at 7.05.14 PM.jpeg" alt="Princess Mia">
    </div>
    
    <div class="poem-container">
        <div class="poem" id="poem"></div>
    </div>
    <div class="controls">
        <button id="newPoemBtn">✨ New Royal Poem ✨</button>
        <button id="catRainBtn">🐱 Cat Rain!</button>
        <button id="sparkleBtn">💖 Sparkle Attack</button>
    </div>
    <div class="title-box" id="titleBox">Princess of Kepler-23</div>
    <div class="meter">
        <p>Princess Power Level: <strong>∞%</strong></p>
        <div class="bar">
            <div class="fill"></div>
        </div>
    </div>
</div>

<script>
// Funny & sweet poems
const poems = [
    `Princess Mia of Kepler-23,\nAdil's favorite cosmic royalty,\nWith a smile that outshines every star,\nAnd a heart as big as a galaxy bar.`,
    `Barbie Princess in space so grand,\nRuling with cats at her royal command,\nShe clicks her heels and planets align,\nThen naps like a queen — simply divine.`,
    `On Kepler-23 the cats all bow,\nWhen Princess Mia says "meow" somehow,\nShe turns every day into pure delight,\nWith laughter that lights up the darkest night.`,
    `From Adil with love across the stars,\nTo the girl who owns a thousand tiaras,\nYou're glitter, you're chaos, you're pure sunshine,\nMy favorite princess — forever thine.`,
    `Cosmic queen with fluffy guards,\nChasing laser dots across the yards,\nOne royal yawn and time stands still,\nPrincess Mia gives the universe chills.`,
    `She wears pink like it's armor of light,\nFights boredom with giggles and might,\nKepler-23's most legendary soul,\nMaking even black holes lose control.`,
    `Princess Barbie meets space opera dream,\nCats in tutus join her royal team,\nAdil bows down with poems and cheer,\nBecause Mia makes the whole year magical, dear.`,
    `Tiny human, giant crown energy,\nRuler of naps and cat supremacy,\nKepler-23 cheers your every move,\nThe universe simply approves.`
];
const titles = [
    "🌟 Supreme Cat Empress of Kepler-23",
    "👑 Official Barbie Princess of the Stars",
    "🐾 Royal Commander of All Fluffy Things",
    "✨ Queen of Cosmic Giggles & Royal Naps",
    "💖 Galactic Goddess of Sparkles",
    "😺 Keeper of Infinite Meows",
    "🌸 Princess of Pink Nebulae",
    
];
function typeText(text, element) {
    element.innerHTML = "";
    let i = 0;
    const timer = setInterval(() => {
        if (i < text.length) {
            element.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
            i++;
        } else {
            clearInterval(timer);
        }
    }, 35);
}
function showRandomPoem() {
    const poemEl = document.getElementById("poem");
    const randomPoem = poems[Math.floor(Math.random() * poems.length)];
    typeText(randomPoem, poemEl);
}
function newTitle() {
    const titleBox = document.getElementById("titleBox");
    titleBox.style.opacity = 0;
    setTimeout(() => {
        titleBox.innerHTML = titles[Math.floor(Math.random() * titles.length)];
        titleBox.style.transition = "opacity 0.6s";
        titleBox.style.opacity = 1;
    }, 300);
}
function catRain() {
    for (let i = 0; i < 28; i++) {
        const cat = document.createElement("div");
        cat.className = "cat";
        cat.innerHTML = ["🐱", "😺", "🐈", "😸", "🐾"][Math.floor(Math.random() * 5)];
        cat.style.left = Math.random() * 100 + "vw";
        cat.style.top = "-60px";
        cat.style.animationDuration = (2.5 + Math.random() * 4) + "s";
        cat.style.fontSize = (28 + Math.random() * 28) + "px";
        document.body.appendChild(cat);
        
        setTimeout(() => cat.remove(), 8000);
    }
}
function createSparkles(count) {
    for (let i = 0; i < count; i++) {
        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        sparkle.innerHTML = ["✨", "💖", "⭐", "🌟"][Math.floor(Math.random() * 4)];
        sparkle.style.left = Math.random() * 100 + "vw";
        sparkle.style.top = Math.random() * 100 + "vh";
        sparkle.style.animationDuration = (0.8 + Math.random() * 0.8) + "s";
        document.body.appendChild(sparkle);
        
        setTimeout(() => sparkle.remove(), 2000);
    }
}
// Create background stars
function createStars() {
    for (let i = 0; i < 80; i++) {
        const star = document.createElement("div");
        star.className = "star";
        star.innerHTML = Math.random() > 0.6 ? "✦" : "★";
        star.style.left = Math.random() * 100 + "vw";
        star.style.top = Math.random() * 100 + "vh";
        star.style.fontSize = (6 + Math.random() * 18) + "px";
        star.style.animationDelay = Math.random() * 4 + "s";
        document.body.appendChild(star);
    }
}
// Event listeners
document.getElementById("newPoemBtn").addEventListener("click", () => {
    showRandomPoem();
    newTitle();
    createSparkles(12);
});
document.getElementById("catRainBtn").addEventListener("click", catRain);
document.getElementById("sparkleBtn").addEventListener("click", () => {
    createSparkles(35);
});
// Initial load
window.onload = () => {
    createStars();
    showRandomPoem();
    newTitle();
    
    // Occasional sparkle rain
    setInterval(() => {
        if (Math.random() > 0.7) createSparkles(8);
    }, 4500);
    
    // Keyboard fun
    document.addEventListener("keydown", (e) => {
        if (e.key === "c" || e.key === "C") catRain();
        if (e.key === "s" || e.key === "S") createSparkles(25);
    });
};
</script>
</body>
</html>
